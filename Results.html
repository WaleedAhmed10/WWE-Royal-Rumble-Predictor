<!DOCTYPE html>
<html>
<head>
    <title>Royal Rumble Results</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #111;
            color: white;
        }
        
        nav {
            background-color: red;
            padding: 15px;
            margin-bottom: 20px;
        }
        
        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
        }
        
        .winner-banner {
            text-align: center;
            padding: 40px;
            background: linear-gradient(135deg, #1a1a1a, #2a2a2a);
            border: 4px solid gold;
            border-radius: 20px;
            margin-bottom: 30px;
        }
        
        .winner-name {
            font-size: 48px;
            color: gold;
            margin: 20px 0;
            text-shadow: 0 0 20px rgba(255,215,0,0.5);
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background-color: #222;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        
        .stat-number {
            font-size: 32px;
            font-weight: bold;
            color: #c00;
        }
        
        .timeline {
            background-color: #222;
            padding: 20px;
            border-radius: 10px;
            max-height: 500px;
            overflow-y: auto;
        }
        
        .timeline-item {
            padding: 12px;
            border-bottom: 1px solid #333;
            font-family: monospace;
        }
        
        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        
        .btn {
            background-color: red;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
        }
        
        .no-results {
            text-align: center;
            padding: 50px;
        }
    </style>
</head>
<body>
    <header>
        <img src="RR26.jfif" style="width: 300px; height: auto; display: block; margin: 0 auto;">
        <nav>
            <a href="Index.html">Home</a> |
            <a href="Wrestlers.html">Wrestlers</a> |
            <a href="Builder.html">Builder</a> |
            <a href="Simulate.html">Simulate</a>
        </nav>
    </header>
    
    <div id="resultsContainer"></div>
    
    <script>
        const results = JSON.parse(localStorage.getItem('simulationResults'));
        
        if (!results) {
            document.getElementById('resultsContainer').innerHTML = `
                <div class="no-results">
                    <h2>No Results Found</h2>
                    <p>Run a Royal Rumble simulation first!</p>
                    <a href="Builder.html" class="btn">Go to Builder</a>
                </div>
            `;
        } else {
            document.getElementById('resultsContainer').innerHTML = `
                <div class="winner-banner">
                    <h2>🏆 ROYAL RUMBLE 2026 WINNER 🏆</h2>
                    <div class="winner-name">${results.winner}</div>
                    <p>Match Duration: ${Math.floor(results.matchDuration)} minutes</p>
                </div>
                
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>⭐ Most Eliminations</h3>
                        <div class="stat-number">${results.mostEliminations}</div>
                        <p>by ${results.mostEliminationsName}</p>
                    </div>
                    <div class="stat-card">
                        <h3>⏳ Iron Man</h3>
                        <div class="stat-number">${results.ironMan}</div>
                        <p>Longest time in ring</p>
                    </div>
                    <div class="stat-card">
                        <h3>📊 Total Eliminations</h3>
                        <div class="stat-number">${results.totalEliminations || 29}</div>
                        <p>out of 29</p>
                    </div>
                </div>
                
                <div class="timeline">
                    <h3>Elimination Timeline</h3>
                    <div id="timelineList"></div>
                </div>
                
                <div class="action-buttons">
                    <button class="btn" onclick="shareResults()">📤 Share Results</button>
                    <button class="btn" onclick="window.location.href='Simulate.html'">🔄 Run Again</button>
                    <button class="btn" onclick="window.location.href='Builder.html'">🔨 Edit Rumble</button>
                    <button class="btn" onclick="window.location.href='Index.html'">🏠 Home</button>
                </div>
            `;
            
            // Display timeline
            const timelineList = document.getElementById('timelineList');
            if (results.timeline && results.timeline.length) {
                timelineList.innerHTML = results.timeline.map(event => {
                    const minutes = Math.floor(event.minute);
                    const seconds = Math.floor((event.minute % 1) * 60);
                    return `
                        <div class="timeline-item">
                            <span style="color: #4CAF50; font-weight: bold; margin-right: 15px;">
                                ${minutes}:${seconds.toString().padStart(2, '0')}
                            </span>
                            <span>${event.text}</span>
                        </div>
                    `;
                }).join('');
            } else {
                timelineList.innerHTML = '<p>No timeline data available</p>';
            }
        }
        
        function shareResults() {
            const text = `🏆 Royal Rumble 2026 Winner: ${results.winner}! ${results.mostEliminations} eliminations! Can you beat my prediction? 🎪`;
            
            if (navigator.share) {
                navigator.share({
                    title: 'Royal Rumble Results',
                    text: text,
                    url: window.location.href
                });
            } else {
                navigator.clipboard.writeText(text);
                alert('Results copied to clipboard! Share with your friends!');
            }
        }
    </script>
</body>
</html>
