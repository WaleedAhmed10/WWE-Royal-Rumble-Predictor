<!DOCTYPE html>
<html>
<head>
    <title>WWE Royal Rumble Wrestler Database</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #111;
            color: white;
        }
        
        nav {
            background-color: red;
            padding: 15px;
            margin-bottom: 20px;
        }
        
        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
        }
        
        .database-operations {
            text-align: center;
            margin: 30px 0;
        }
        
        .database-operations button {
            background-color: red;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .wrestler-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }
        
        .wrestler-card {
            background-color: #222;
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #444;
        }
        
        .wrestler-card h3 {
            margin-top: 0;
            color: #c00;
        }
        
        .wrestler-stats p {
            margin: 8px 0;
            font-size: 14px;
        }
        
        .wrestler-actions button {
            background-color: #444;
            color: white;
            border: none;
            padding: 5px 10px;
            margin: 5px;
            border-radius: 3px;
            cursor: pointer;
        }
        
        .wrestler-actions button:hover {
            background-color: #666;
        }
        
        .search-container {
            text-align: center;
            margin: 20px;
        }
        
        #search-wrestlers {
            padding: 10px;
            width: 300px;
            border-radius: 5px;
            border: none;
            background-color: #333;
            color: white;
        }
        
        .wrestler-count {
            text-align: center;
            margin: 20px;
            font-size: 18px;
            color: #4CAF50;
        }
        
        .empty-state {
            text-align: center;
            padding: 50px;
            color: #888;
        }
        
        @media (max-width: 768px) {
            .wrestler-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header>
        <img src="RR26.jfif" style="width: 300px; height: auto; display: block; margin: 0 auto;">
        <nav>
            <a href="Index.html">Home</a> |
            <a href="Wrestlers.html">Wrestlers</a> |
            <a href="Builder.html">Builder</a> |
            <a href="Simulate.html">Simulate</a>
        </nav>
    </header>
    
    <div class="database-operations">
        <button onclick="AddWrestler()">➕ Add Wrestler</button>
        <button onclick="ExportDB()">📤 Export Database</button>
        <button onclick="ImportDB()">📥 Import Database</button>
        <button onclick="resetToDefault()">🔄 Reset to Default</button>
        <button onclick="clearAllWrestlers()">🗑️ Clear All</button>
    </div>
    
    <div class="search-container">
        <input type="text" id="search-wrestlers" placeholder="🔍 Search wrestlers by name or brand...">
    </div>
    
    <div id="wrestlers-container" class="wrestler-grid">
        <div class="empty-state">Loading wrestlers...</div>
    </div>
    
    <div style="text-align: center; margin: 40px;">
        <a href="Builder.html">
            <button style="background: red; padding: 15px 30px; font-size: 16px;">🎪 Go to Rumble Builder →</button>
        </a>
    </div>
    
    <script>
        // ============ GLOBAL VARIABLES ============
        let wrestlers = [];
        const STORAGE_KEY = 'royalRumbleWrestlers';
        
        // ============ DEFAULT WRESTLERS (YOUR PREDICTION) ============
        function getDefaultWrestlers() {
            return [
                { id: 1, name: 'LA Knight', winProbability: 15.0, eliminationResistance: 1.8, brand: 'Raw' },
                { id: 2, name: 'Roman Reigns', winProbability: 8.5, eliminationResistance: 1.9, brand: 'SmackDown' },
                { id: 3, name: 'Cody Rhodes', winProbability: 7.0, eliminationResistance: 1.5, brand: 'Raw' },
                { id: 4, name: 'Sami Zayn', winProbability: 6.5, eliminationResistance: 1.4, brand: 'SmackDown' },
                { id: 5, name: 'Bron Breaker', winProbability: 6.0, eliminationResistance: 1.7, brand: 'NXT' },
                { id: 6, name: 'Jacob Fatu', winProbability: 5.5, eliminationResistance: 1.8, brand: 'SmackDown' },
                { id: 7, name: 'Randy Orton', winProbability: 5.0, eliminationResistance: 2.0, brand: 'SmackDown' },
                { id: 8, name: 'Gunther', winProbability: 4.5, eliminationResistance: 1.7, brand: 'Raw' },
                { id: 9, name: 'Solo Sikoa', winProbability: 4.0, eliminationResistance: 1.6, brand: 'SmackDown' },
                { id: 10, name: 'Oba Femi', winProbability: 3.5, eliminationResistance: 1.8, brand: 'NXT' }
            ];
        }
        
        // ============ INITIALIZATION ============
        document.addEventListener('DOMContentLoaded', function() {
            loadWrestlers();
            displayWrestlers();
            setupSearch();
        });
        
        function loadWrestlers() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                wrestlers = JSON.parse(saved);
            } else {
                wrestlers = getDefaultWrestlers();
                saveWrestlers();
            }
        }
        
        function saveWrestlers() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(wrestlers));
        }
        
        // ============ DISPLAY WRESTLERS ============
        function displayWrestlers() {
            const container = document.getElementById('wrestlers-container');
            
            if (wrestlers.length === 0) {
                container.innerHTML = `<div class="empty-state">🤼 No wrestlers yet. Click "Add Wrestler" to start building your database!</div>`;
                return;
            }
            
            container.innerHTML = '';
            
            wrestlers.forEach(wrestler => {
                const card = document.createElement('div');
                card.className = 'wrestler-card';
                card.innerHTML = `
                    <h3>${wrestler.name}</h3>
                    <div class="wrestler-stats">
                        <p>🏆 Win Probability: ${wrestler.winProbability}%</p>
                        <p>🛡️ Elimination Resistance: ${wrestler.eliminationResistance}</p>
                        <p>🎪 Brand: ${wrestler.brand || 'Unknown'}</p>
                    </div>
                    <div class="wrestler-actions">
                        <button onclick="editWrestler(${wrestler.id})">✏️ Edit</button>
                        <button onclick="deleteWrestler(${wrestler.id})">🗑️ Delete</button>
                    </div>
                `;
                container.appendChild(card);
            });
            
            // Update count
            const countDiv = document.querySelector('.wrestler-count') || document.createElement('div');
            countDiv.className = 'wrestler-count';
            countDiv.innerHTML = `Total Wrestlers: ${wrestlers.length}`;
            if (!document.querySelector('.wrestler-count')) {
                container.parentNode.insertBefore(countDiv, container);
            } else {
                document.querySelector('.wrestler-count').innerHTML = `Total Wrestlers: ${wrestlers.length}`;
            }
        }
        
        // ============ CRUD OPERATIONS ============
        function AddWrestler() {
            const name = prompt('Enter wrestler name:');
            if (!name || name.trim() === '') return;
            
            const winProb = prompt('Enter win probability (1-100%):', '5');
            if (!winProb || isNaN(winProb)) return;
            
            const resistance = prompt('Enter elimination resistance (0.5-2.0):', '1.0');
            if (!resistance || isNaN(resistance)) return;
            
            const brand = prompt('Enter brand (Raw/SmackDown/NXT/Legend):', '');
            
            const newWrestler = {
                id: Date.now(),
                name: name.trim(),
                winProbability: parseFloat(winProb),
                eliminationResistance: parseFloat(resistance),
                brand: brand || 'Unknown'
            };
            
            wrestlers.push(newWrestler);
            saveWrestlers();
            displayWrestlers();
            alert(`${name} added to database!`);
        }
        
        function editWrestler(id) {
            const wrestler = wrestlers.find(w => w.id === id);
            if (!wrestler) return;
            
            const newName = prompt('Edit name:', wrestler.name);
            if (!newName) return;
            
            const newWinProb = prompt('Edit win probability:', wrestler.winProbability);
            if (!newWinProb) return;
            
            const newResistance = prompt('Edit elimination resistance:', wrestler.eliminationResistance);
            if (!newResistance) return;
            
            const newBrand = prompt('Edit brand:', wrestler.brand);
            
            wrestler.name = newName.trim();
            wrestler.winProbability = parseFloat(newWinProb);
            wrestler.eliminationResistance = parseFloat(newResistance);
            wrestler.brand = newBrand || 'Unknown';
            
            saveWrestlers();
            displayWrestlers();
            alert('Wrestler updated!');
        }
        
        function deleteWrestler(id) {
            if (!confirm('Delete this wrestler?')) return;
            
            const index = wrestlers.findIndex(w => w.id === id);
            if (index !== -1) {
                wrestlers.splice(index, 1);
                saveWrestlers();
                displayWrestlers();
                alert('Wrestler deleted!');
            }
        }
        
        function resetToDefault() {
            if (confirm('Reset to default roster? This will replace all your wrestlers.')) {
                wrestlers = getDefaultWrestlers();
                saveWrestlers();
                displayWrestlers();
                alert('Reset to default roster!');
            }
        }
        
        function clearAllWrestlers() {
            if (confirm('Delete ALL wrestlers? This cannot be undone.')) {
                wrestlers = [];
                saveWrestlers();
                displayWrestlers();
                alert('All wrestlers deleted!');
            }
        }
        
        // ============ IMPORT/EXPORT ============
        function ExportDB() {
            if (wrestlers.length === 0) {
                alert('No wrestlers to export!');
                return;
            }
            
            const dataStr = JSON.stringify(wrestlers, null, 2);
            const blob = new Blob([dataStr], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `wrestlers-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
            alert('Database exported!');
        }
        
        function ImportDB() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = function(e) {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = function(event) {
                    try {
                        const imported = JSON.parse(event.target.result);
                        if (Array.isArray(imported)) {
                            if (confirm(`Import ${imported.length} wrestlers? This will replace your current database.`)) {
                                wrestlers = imported;
                                saveWrestlers();
                                displayWrestlers();
                                alert('Import successful!');
                            }
                        } else {
                            alert('Invalid file format');
                        }
                    } catch (error) {
                        alert('Error parsing JSON file');
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }
        
        // ============ SEARCH ============
        function setupSearch() {
            const searchInput = document.getElementById('search-wrestlers');
            if (searchInput) {
                searchInput.addEventListener('input', function(e) {
                    const term = e.target.value.toLowerCase();
                    const filtered = wrestlers.filter(w => 
                        w.name.toLowerCase().includes(term) || 
                        (w.brand && w.brand.toLowerCase().includes(term))
                    );
                    
                    const container = document.getElementById('wrestlers-container');
                    if (filtered.length === 0) {
                        container.innerHTML = '<div class="empty-state">No wrestlers found</div>';
                        return;
                    }
                    
                    container.innerHTML = '';
                    filtered.forEach(wrestler => {
                        const card = document.createElement('div');
                        card.className = 'wrestler-card';
                        card.innerHTML = `
                            <h3>${wrestler.name}</h3>
                            <div class="wrestler-stats">
                                <p>🏆 Win: ${wrestler.winProbability}%</p>
                                <p>🛡️ Resistance: ${wrestler.eliminationResistance}</p>
                                <p>🎪 ${wrestler.brand || 'Unknown'}</p>
                            </div>
                            <div class="wrestler-actions">
                                <button onclick="editWrestler(${wrestler.id})">✏️ Edit</button>
                                <button onclick="deleteWrestler(${wrestler.id})">🗑️ Delete</button>
                            </div>
                        `;
                        container.appendChild(card);
                    });
                });
            }
        }
    </script>
</body>
</html>
