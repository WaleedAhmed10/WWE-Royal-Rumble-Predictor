<!DOCTYPE html>
<html>
<head>
    <title>Royal Rumble Simulation</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #111;
            color: white;
        }
        
        nav {
            background-color: red;
            padding: 15px;
            margin-bottom: 20px;
        }
        
        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
        }
        
        .controls {
            background-color: #222;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
        }
        
        .controls button {
            background-color: red;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 20px 0;
        }
        
        .stat-card {
            background-color: #222;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        
        .timeline {
            background-color: #222;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            max-height: 400px;
            overflow-y: auto;
        }
        
        .timeline-event {
            padding: 10px;
            border-bottom: 1px solid #333;
            font-family: monospace;
        }
        
        .event-time {
            color: #4CAF50;
            font-weight: bold;
            margin-right: 15px;
        }
        
        .winner-display {
            text-align: center;
            padding: 40px;
            background: linear-gradient(135deg, #1a1a1a, #2a2a2a);
            border: 3px solid gold;
            border-radius: 15px;
            margin: 30px 0;
            display: none;
        }
        
        .winner-name {
            font-size: 48px;
            color: gold;
            margin: 20px 0;
        }
        
        .progress-bar {
            width: 100%;
            height: 20px;
            background-color: #333;
            border-radius: 10px;
            overflow: hidden;
            margin: 20px 0;
        }
        
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #c00, #f00);
            transition: width 0.5s;
        }
    </style>
</head>
<body>
    <header>
        <img src="RR26.jfif" style="width: 300px; height: auto; display: block; margin: 0 auto;">
        <nav>
            <a href="Index.html">Home</a> |
            <a href="Wrestlers.html">Wrestlers</a> |
            <a href="Builder.html">Builder</a> |
            <a href="Simulate.html">Simulate</a>
        </nav>
    </header>
    
    <h1 style="text-align: center;">Royal Rumble Simulation</h1>
    
    <div class="controls">
        <button id="startBtn">▶️ Start Simulation</button>
        <button id="pauseBtn" disabled>⏸️ Pause</button>
        <button id="speedBtn">⚡ Speed: 1x</button>
        <button id="resultsBtn" disabled>📊 View Results</button>
    </div>
    
    <div class="stats">
        <div class="stat-card">
            <h3>⏱️ Match Time</h3>
            <p id="matchTime" style="font-size: 24px;">0:00</p>
        </div>
        <div class="stat-card">
            <h3>👥 In Ring</h3>
            <p id="inRing" style="font-size: 24px;">0</p>
        </div>
        <div class="stat-card">
            <h3>❌ Eliminated</h3>
            <p id="eliminated" style="font-size: 24px;">0/29</p>
        </div>
    </div>
    
    <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
    </div>
    
    <div class="timeline">
        <h3>Elimination Timeline</h3>
        <div id="timelineEvents">
            <div class="timeline-event">
                <span class="event-time">0:00</span>
                <span>Royal Rumble begins!</span>
            </div>
        </div>
    </div>
    
    <div id="winnerDisplay" class="winner-display">
        <h2>🏆 ROYAL RUMBLE WINNER 🏆</h2>
        <div id="winnerName" class="winner-name">-</div>
        <button onclick="goToResults()">📊 View Detailed Results</button>
    </div>
    
    <script>
        let matchData = {
            isRunning: false,
            intervalId: null,
            minute: 0,
            speed: 1,
            entryQueue: [],
            activeWrestlers: [],
            eliminated: [],
            timeline: []
        };
        
        let rumbleSetup = null;
        let simulationComplete = false;
        
        document.addEventListener('DOMContentLoaded', function() {
            loadSetup();
            setupControls();
        });
        
        function loadSetup() {
            const saved = localStorage.getItem('currentRumbleSetup');
            if (!saved) {
                alert('No rumble setup found! Please build a Royal Rumble first.');
                window.location.href = 'Builder.html';
                return;
            }
            
            rumbleSetup = JSON.parse(saved);
            
            // Initialize entry queue sorted by entry number
            matchData.entryQueue = [...rumbleSetup.wrestlers].sort((a, b) => a.entryNumber - b.entryNumber);
            
            document.getElementById('startBtn').disabled = false;
        }
        
        function setupControls() {
            document.getElementById('startBtn').onclick = startSimulation;
            document.getElementById('pauseBtn').onclick = togglePause;
            document.getElementById('speedBtn').onclick = toggleSpeed;
            document.getElementById('resultsBtn').onclick = goToResults;
        }
        
        function startSimulation() {
            if (matchData.isRunning) return;
            
            matchData.isRunning = true;
            document.getElementById('startBtn').disabled = true;
            document.getElementById('pauseBtn').disabled = false;
            
            runSimulationLoop();
        }
        
        function togglePause() {
            matchData.isRunning = !matchData.isRunning;
            document.getElementById('pauseBtn').textContent = matchData.isRunning ? '⏸️ Pause' : '▶️ Resume';
            
            if (matchData.isRunning) {
                runSimulationLoop();
            } else if (matchData.intervalId) {
                clearInterval(matchData.intervalId);
                matchData.intervalId = null;
            }
        }
        
        function toggleSpeed() {
            matchData.speed = matchData.speed === 1 ? 3 : 1;
            document.getElementById('speedBtn').textContent = `⚡ Speed: ${matchData.speed}x`;
            
            if (matchData.isRunning) {
                if (matchData.intervalId) {
                    clearInterval(matchData.intervalId);
                    matchData.intervalId = null;
                }
                runSimulationLoop();
            }
        }
        
        function runSimulationLoop() {
            if (matchData.intervalId) {
                clearInterval(matchData.intervalId);
            }
            
            matchData.intervalId = setInterval(() => {
                if (!matchData.isRunning) return;
                
                simulateMinute();
                
                // Check if match should end
                if (matchData.eliminated.length >= 29 || matchData.activeWrestlers.length === 1 && matchData.entryQueue.length === 0) {
                    endSimulation();
                }
            }, 1000 / matchData.speed);
        }
        
        function simulateMinute() {
            matchData.minute++;
            updateMatchTime();
            
            // Check for new entries (every 90 seconds)
            const entryIndex = Math.floor(matchData.minute / 1.5);
            while (matchData.entryQueue.length > 0 && matchData.entryQueue[0].entryNumber === entryIndex) {
                const newWrestler = matchData.entryQueue.shift();
                matchData.activeWrestlers.push({
                    ...newWrestler,
                    stamina: 100,
                    momentum: 0,
                    eliminations: 0
                });
                addTimelineEvent(`${newWrestler.name} enters at #${newWrestler.entryNumber}!`);
            }
            
            // Check eliminations for each active wrestler
            const toEliminate = [];
            
            matchData.activeWrestlers.forEach(w => {
                // Update stamina
                w.stamina -= 1 + (matchData.activeWrestlers.length / 10);
                w.momentum *= 0.95;
                
                // Calculate elimination chance
                let elimChance = 0.05; // Base 5% per minute
                elimChance *= (1 + (100 - w.stamina) / 200); // Fatigue factor
                elimChance /= (w.eliminationResistance || 1.0);
                elimChance /= (1 + w.momentum);
                
                if (Math.random() < elimChance) {
                    toEliminate.push(w);
                }
            });
            
            // Process eliminations
            toEliminate.forEach(w => {
                const index = matchData.activeWrestlers.indexOf(w);
                if (index !== -1) {
                    matchData.activeWrestlers.splice(index, 1);
                    matchData.eliminated.push(w);
                    
                    // Random eliminator
                    if (matchData.activeWrestlers.length > 0) {
                        const eliminator = matchData.activeWrestlers[Math.floor(Math.random() * matchData.activeWrestlers.length)];
                        eliminator.eliminations++;
                        eliminator.momentum += 0.25;
                        addTimelineEvent(`❌ ${w.name} eliminated by ${eliminator.name}!`);
                    } else {
                        addTimelineEvent(`❌ ${w.name} eliminated!`);
                    }
                    
                    updateEliminatedCount();
                    updateProgressBar();
                }
            });
            
            updateInRingCount();
        }
        
        function addTimelineEvent(text) {
            matchData.timeline.push({
                minute: matchData.minute,
                text: text
            });
            
            const timelineDiv = document.getElementById('timelineEvents');
            const eventDiv = document.createElement('div');
            eventDiv.className = 'timeline-event';
            const minutes = Math.floor(matchData.minute);
            const seconds = Math.floor((matchData.minute % 1) * 60);
            eventDiv.innerHTML = `
                <span class="event-time">${minutes}:${seconds.toString().padStart(2, '0')}</span>
                <span>${text}</span>
            `;
            timelineDiv.appendChild(eventDiv);
            timelineDiv.scrollTop = timelineDiv.scrollHeight;
        }
        
        function updateMatchTime() {
            const minutes = Math.floor(matchData.minute);
            const seconds = Math.floor((matchData.minute % 1) * 60);
            document.getElementById('matchTime').textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
        }
        
        function updateInRingCount() {
            document.getElementById('inRing').textContent = matchData.activeWrestlers.length;
        }
        
        function updateEliminatedCount() {
            document.getElementById('eliminated').textContent = `${matchData.eliminated.length}/29`;
        }
        
        function updateProgressBar() {
            const percent = (matchData.eliminated.length / 29) * 100;
            document.getElementById('progressFill').style.width = `${percent}%`;
        }
        
        function endSimulation() {
            matchData.isRunning = false;
            if (matchData.intervalId) {
                clearInterval(matchData.intervalId);
                matchData.intervalId = null;
            }
            
            // Determine winner
            let winner = null;
            if (matchData.activeWrestlers.length === 1) {
                winner = matchData.activeWrestlers[0];
            } else if (matchData.eliminated.length === 29 && matchData.activeWrestlers.length > 0) {
                winner = matchData.activeWrestlers[0];
            } else {
                winner = matchData.activeWrestlers[0] || matchData.eliminated[matchData.eliminated.length - 1];
            }
            
            if (winner) {
                addTimelineEvent(`🏆 WINNER: ${winner.name}! 🏆`);
                document.getElementById('winnerName').textContent = winner.name;
                document.getElementById('winnerDisplay').style.display = 'block';
                
                // Save results
                const results = {
                    winner: winner.name,
                    matchDuration: matchData.minute,
                    mostEliminations: Math.max(...matchData.activeWrestlers.concat(matchData.eliminated).map(w => w.eliminations || 0), 0),
                    mostEliminationsName: matchData.activeWrestlers.concat(matchData.eliminated).reduce((a, b) => (a.eliminations || 0) > (b.eliminations || 0) ? a : b, { name: 'Unknown' }).name,
                    ironMan: matchData.activeWrestlers.concat(matchData.eliminated).reduce((a, b) => (a.timeInRing || 0) > (b.timeInRing || 0) ? a : b, { name: 'Unknown' }).name,
                    timeline: matchData.timeline,
                    totalEliminations: matchData.eliminated.length
                };
                
                localStorage.setItem('simulationResults', JSON.stringify(results));
                
                // Add to history
                const history = JSON.parse(localStorage.getItem('simulationHistory') || '[]');
                history.unshift({
                    winner: winner.name,
                    date: new Date().toLocaleString(),
                    duration: matchData.minute,
                    mostEliminations: results.mostEliminations
                });
                localStorage.setItem('simulationHistory', JSON.stringify(history.slice(0, 10)));
                
                document.getElementById('resultsBtn').disabled = false;
                simulationComplete = true;
            }
        }
        
        function goToResults() {
            if (simulationComplete) {
                window.location.href = 'Results.html';
            } else {
                alert('Complete a simulation first!');
            }
        }
    </script>
</body>
</html>
