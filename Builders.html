<!DOCTYPE html>
<html>
<head>
    <title>WWE Royal Rumble Builder</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #111;
            color: white;
        }
        
        nav {
            background-color: red;
            padding: 15px;
            margin-bottom: 20px;
        }
        
        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
        }
        
        .builder-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        .database-panel {
            flex: 1;
            min-width: 250px;
            background-color: #222;
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #444;
            max-height: 600px;
            overflow-y: auto;
        }
        
        .rumble-panel {
            flex: 2;
            min-width: 400px;
            background-color: #222;
            padding: 20px;
            border-radius: 10px;
            border: 2px solid red;
        }
        
        .search-box {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 5px;
            border: none;
            background-color: #333;
            color: white;
        }
        
        .wrestler-item {
            background-color: #333;
            padding: 10px;
            margin: 5px 0;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .wrestler-item:hover {
            background-color: #c00;
            transform: translateX(5px);
        }
        
        .ringslots {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin: 20px 0;
        }
        
        .slot {
            background-color: #333;
            border: 2px dashed #555;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            min-height: 100px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .slot.filled {
            border: 2px solid #4CAF50;
            background-color: #1a331a;
        }
        
        .slot-number {
            font-weight: bold;
            font-size: 12px;
            color: #aaa;
        }
        
        .slot-status {
            font-size: 11px;
            color: #888;
            margin-top: 5px;
        }
        
        .slot-content {
            margin-top: 10px;
            font-weight: bold;
        }
        
        .builder-controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 20px 0;
        }
        
        .builder-controls button, .builder-controls a {
            background-color: red;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            text-align: center;
        }
        
        .counter {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #c00;
            color: white;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
        }
        
        @media (max-width: 768px) {
            .builder-container {
                flex-direction: column;
            }
            .rumble-panel {
                min-width: auto;
            }
            .ringslots {
                grid-template-columns: repeat(3, 1fr);
            }
        }
    </style>
</head>
<body>
    <header>
        <img src="RR26.jfif" style="width: 300px; height: auto; display: block; margin: 0 auto;">
        <nav>
            <a href="Index.html">Home</a> |
            <a href="Wrestlers.html">Wrestlers</a> |
            <a href="Builder.html">Builder</a> |
            <a href="Simulate.html">Simulate</a>
        </nav>
    </header>
    
    <h1 style="text-align: center;">Royal Rumble Builder</h1>
    <p style="text-align: center;">Select 30 wrestlers and assign entry numbers 1-30</p>
    
    <div class="builder-container">
        <div class="database-panel">
            <h3>Your Wrestlers</h3>
            <input type="text" id="search-wrestlers" class="search-box" placeholder="🔍 Search wrestlers...">
            <div id="wrestlers-list"></div>
        </div>
        
        <div class="rumble-panel">
            <h3>Royal Rumble Slots (30 Required)</h3>
            <div id="ringslots" class="ringslots"></div>
        </div>
    </div>
    
    <div class="builder-controls">
        <button onclick="randomizeEntries()">🎲 Randomize Entries</button>
        <button onclick="clearAllSlots()">🗑️ Clear All</button>
        <button onclick="saveRumbleSetup()">💾 Save Setup</button>
        <a href="Simulate.html" id="simulate-link">▶️ Simulate Rumble</a>
    </div>
    
    <div id="counter" class="counter" style="display: none;">0/30 Selected</div>
    
    <script>
        let allWrestlers = [];
        let selectedSlots = new Array(31).fill(null); // Index 1-30
        
        document.addEventListener('DOMContentLoaded', function() {
            loadWrestlers();
            generateSlots();
            loadSavedSetup();
        });
        
        function loadWrestlers() {
            const saved = localStorage.getItem('royalRumbleWrestlers');
            if (saved) {
                allWrestlers = JSON.parse(saved);
                displayWrestlersList(allWrestlers);
            } else {
                document.getElementById('wrestlers-list').innerHTML = '<p>No wrestlers found. Go to Wrestlers page first!</p>';
            }
        }
        
        function displayWrestlersList(wrestlers) {
            const container = document.getElementById('wrestlers-list');
            container.innerHTML = '';
            
            wrestlers.forEach(w => {
                const div = document.createElement('div');
                div.className = 'wrestler-item';
                div.innerHTML = `
                    <strong>${w.name}</strong>
                    <div style="font-size: 12px; color: #aaa;">Win: ${w.winProbability}% | ${w.brand || ''}</div>
                `;
                div.onclick = () => selectWrestlerForNextSlot(w);
                container.appendChild(div);
            });
        }
        
        let currentEditingSlot = null;
        
        function selectWrestlerForNextSlot(wrestler) {
            if (currentEditingSlot) {
                assignWrestlerToSlot(currentEditingSlot, wrestler);
                currentEditingSlot = null;
            } else {
                alert('Click on a slot first, then click a wrestler to assign!');
            }
        }
        
        function generateSlots() {
            const container = document.getElementById('ringslots');
            container.innerHTML = '';
            
            for (let i = 1; i <= 30; i++) {
                const slot = document.createElement('div');
                slot.className = 'slot';
                slot.dataset.slot = i;
                slot.innerHTML = `
                    <div class="slot-number">Entry #${i}</div>
                    <div class="slot-content" id="slot-content-${i}"></div>
                    <div class="slot-status">Empty</div>
                `;
                slot.onclick = () => {
                    currentEditingSlot = i;
                    alert(`Click on a wrestler to assign to Entry #${i}`);
                };
                container.appendChild(slot);
            }
        }
        
        function assignWrestlerToSlot(slotNumber, wrestler) {
            selectedSlots[slotNumber] = wrestler;
            updateSlotDisplay(slotNumber, wrestler);
            updateCounter();
        }
        
        function updateSlotDisplay(slotNumber, wrestler) {
            const slotContent = document.getElementById(`slot-content-${slotNumber}`);
            const slotDiv = document.querySelector(`.slot[data-slot="${slotNumber}"]`);
            
            if (slotContent) {
                slotContent.innerHTML = `<div style="color: #4CAF50;">${wrestler.name}</div>`;
            }
            if (slotDiv) {
                slotDiv.classList.add('filled');
                slotDiv.querySelector('.slot-status').textContent = 'Filled';
                slotDiv.querySelector('.slot-status').style.color = '#4CAF50';
            }
        }
        
        function updateCounter() {
            const filled = selectedSlots.filter(s => s !== null).length;
            const counter = document.getElementById('counter');
            
            if (filled > 0) {
                counter.style.display = 'block';
                counter.innerHTML = `${filled}/30 Selected`;
            } else {
                counter.style.display = 'none';
            }
            
            const simulateLink = document.getElementById('simulate-link');
            if (filled === 30) {
                simulateLink.style.opacity = '1';
                simulateLink.style.pointerEvents = 'auto';
            } else {
                simulateLink.style.opacity = '0.5';
                simulateLink.style.pointerEvents = 'none';
            }
        }
        
        function randomizeEntries() {
            if (allWrestlers.length < 30) {
                alert(`Need at least 30 wrestlers. You have ${allWrestlers.length}. Add more wrestlers first!`);
                return;
            }
            
            const shuffled = [...allWrestlers].sort(() => Math.random() - 0.5);
            const selected = shuffled.slice(0, 30);
            
            for (let i = 1; i <= 30; i++) {
                assignWrestlerToSlot(i, selected[i - 1]);
            }
            
            alert('Random entries assigned!');
        }
        
        function clearAllSlots() {
            if (confirm('Clear all slot assignments?')) {
                for (let i = 1; i <= 30; i++) {
                    selectedSlots[i] = null;
                    const slotContent = document.getElementById(`slot-content-${i}`);
                    if (slotContent) slotContent.innerHTML = '';
                    
                    const slotDiv = document.querySelector(`.slot[data-slot="${i}"]`);
                    if (slotDiv) {
                        slotDiv.classList.remove('filled');
                        slotDiv.querySelector('.slot-status').textContent = 'Empty';
                        slotDiv.querySelector('.slot-status').style.color = '#888';
                    }
                }
                updateCounter();
            }
        }
        
        function saveRumbleSetup() {
            const filledSlots = selectedSlots.filter(s => s !== null);
            
            if (filledSlots.length !== 30) {
                alert(`Need ${30 - filledSlots.length} more wrestlers!`);
                return;
            }
            
            const setup = {
                wrestlers: selectedSlots.slice(1).map((w, index) => ({
                    id: w.id,
                    name: w.name,
                    winProbability: w.winProbability,
                    eliminationResistance: w.eliminationResistance,
                    brand: w.brand,
                    entryNumber: index + 1
                })),
                createdAt: new Date().toISOString()
            };
            
            localStorage.setItem('currentRumbleSetup', JSON.stringify(setup));
            alert('Rumble setup saved! Click Simulate to run the match.');
        }
        
        function loadSavedSetup() {
            const saved = localStorage.getItem('currentRumbleSetup');
            if (saved) {
                const setup = JSON.parse(saved);
                if (setup.wrestlers && setup.wrestlers.length === 30) {
                    for (let i = 0; i < setup.wrestlers.length; i++) {
                        assignWrestlerToSlot(i + 1, setup.wrestlers[i]);
                    }
                }
            }
        }
        
        // Search functionality
        document.getElementById('search-wrestlers').addEventListener('input', function(e) {
            const term = e.target.value.toLowerCase();
            const filtered = allWrestlers.filter(w => 
                w.name.toLowerCase().includes(term) || 
                (w.brand && w.brand.toLowerCase().includes(term))
            );
            displayWrestlersList(filtered);
        });
    </script>
</body>
</html>
